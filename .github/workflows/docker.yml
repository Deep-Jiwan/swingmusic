name: Build & Push Docker Image
run-name: "Docker: ${{ github.event.inputs.tag || github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 1.2.3 or latest)"
        required: false
        default: "latest"
      is_latest:
        description: "Also tag as :latest"
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"

jobs:
  # ─────────────────────────────────────────────
  # 1. Build the web client from the personal fork
  # ─────────────────────────────────────────────
  build-client:
    name: Build webclient (Deep-Jiwan/webclient)
    runs-on: ubuntu-latest

    steps:
      - name: Clone forked webclient
        uses: actions/checkout@v4
        with:
          repository: "Deep-Jiwan/webclient"
          ref: master

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies & build client
        run: |
          yarn install
          yarn build
          mv dist client

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client
          path: client/
          compression-level: 0

  # ─────────────────────────────────────────────
  # 2. Build & push Docker image (amd64 only)
  # ─────────────────────────────────────────────
  docker:
    name: Build & push Docker image (amd64)
    runs-on: ubuntu-latest
    needs: [build-client]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout swingmusic
        uses: actions/checkout@v4

      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client
          path: client

      # Bundle the built client into the wheel via client.zip.
      # settings.py checks for this zip first (extract_default_client) before
      # falling back to downloading from GitHub.
      - name: Zip client into src/swingmusic/client.zip
        run: |
          cd client && zip -r ../client.zip . && cd ..
          rm -rf client
          mkdir -p src/swingmusic
          mv client.zip src/swingmusic/client.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"
          IMAGE="${IMAGE,,}"
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          TAGS="${IMAGE}:${TAG}"
          if [[ "${{ github.event.inputs.is_latest }}" == "true" && "${TAG}" != "latest" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            app_version=2.1.12
          cache-from: type=gha
          cache-to: type=gha,mode=max
